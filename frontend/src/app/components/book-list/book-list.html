<h2>Book Collection</h2>
<table border="1" style="width:80%; text-align: center;">
  <thead>
    <tr>
      <th>Title</th>
      <th>Author</th>
      <th>ISBN</th>
      <th>Published</th>
      <th>Update</th>
      <th>Remove</th>
    </tr>
  </thead>
  <tbody>
      <tr *ngFor="let b of books" 
        app-book-item 
        [book]="b" 
        (edit)="onEdit($event)" 
        (delete)="onDelete($event)">
    </tr>
  </tbody>
</table>

  <!-- save book modal -->
  <button class="fab" (click)="toggleModal()">+</button>
<div class="modal-overlay" *ngIf="showModal">
  <div class="modal-content">
    <h3>Add New Book</h3>
    <hr>
    <div class="form-group">
      <label>Title</label>
      <input type="text" [(ngModel)]="newBook.title">
    </div>
    <div class="form-group">
      <label>Author</label>
      <input type="text" [(ngModel)]="newBook.author">
    </div>
    <div class="form-group">
      <label>ISBN</label>
      <input type="text" [(ngModel)]="newBook.isbn">
    </div>
    <div class="form-group">
      <label>Published Date</label>
      <input type="date" [(ngModel)]="newBook.publicationDate">
    </div>

    <div class="modal-actions">
      <button (click)="toggleModal()" class="btn-cancel">Cancel</button>
      <button (click)="saveBook()" class="btn-save">Save Book</button>
    </div>
  </div>
</div>

<p *ngIf="books.length === 0">No books found. Add one via Postman to see it here!</p>
